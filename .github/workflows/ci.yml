name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # The full suite completes in well under 5 minutes locally; a generous
    # ceiling stops a wedged child process (fleet/supervise spawn real
    # children) from burning GitHub's default 360-minute limit per lane.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Maintained LTS lines. Node 18 is EOL (2025-04-30) and dropped; the
        # engines floor (>=18.17, for readdirSync recursive) is stated in
        # package.json but only maintained lines get CI lanes.
        node-version: ["20.x", "24.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Package and skill smoke checks
        run: |
          npm pack --dry-run --ignore-scripts
          npm run sync-skill -- "$RUNNER_TEMP/kimi-workflows-skill"
      # Zero dependencies -- no install step. The suite list lives in ONE place:
      # runner/test/all.js globs every runner/test/*.test.js (plus offline.js),
      # so a new test file runs here automatically. Every suite is offline (no
      # Kimi binary, no credentials, no network, no model spend): unit checks,
      # the fake-kimi session/spawn drivers, viewer robustness, the no-reload
      # live update channel, the ASCII map renderer, and the plan-safety sweep.
      - name: Test suite (runner/test/all.js, offline)
        run: npm test
